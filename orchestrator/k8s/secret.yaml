# Vul NOOIT echte credentials in dit bestand in.
# Maak het secret aan via kubectl of een secrets manager:
#
#   kubectl create secret generic bbfit-kraken \
#     --namespace bbfit \
#     --from-literal=ApiKey=<jouw-kraken-api-key> \
#     --from-literal=ApiSecret=<jouw-kraken-api-secret>
#
# Of gebruik sealed-secrets / External Secrets Operator voor GitOps.
apiVersion: v1
kind: Secret
metadata:
  name: bbfit-kraken
  namespace: bbfit
type: Opaque
stringData:
  ApiKey: ""
  ApiSecret: ""
