name: Orchestrator CI

on:
  push:
    branches: [main, feature/**]
    paths:
      - 'orchestrator/**'
      - '.github/workflows/orchestrator-ci.yml'
      - 'bbfit.onnx'
      - 'bbfit.meta.json'
  pull_request:
    branches: [main]
    paths:
      - 'orchestrator/**'

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/${{ github.repository_owner }}/bb-fit/bbfit-orchestrator

jobs:
  # ── 1. Build & test ────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    defaults:
      run:
        working-directory: orchestrator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore BbFit.slnx

      - name: Build
        run: dotnet build BbFit.slnx --no-restore -c Release

      - name: Test
        run: >
          dotnet test BbFit.slnx
          --no-build -c Release
          --logger "trx;LogFileName=results.trx"
          --results-directory ./TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit results
          path: orchestrator/TestResults/results.trx
          reporter: dotnet-trx

  # ── 2. Bouw en push ARM64 image naar GHCR ─────────────────────────────────
  docker-publish:
    name: Docker publish (ARM64 → GHCR)
    runs-on: ubuntu-latest
    needs: build-and-test
    # Alleen pushen op main; bij PRs alleen bouwen (push: false)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (+ push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: orchestrator/Dockerfile
          platforms: linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Deploy naar Kubernetes (alleen op main) ─────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure namespace exists
        run: kubectl get namespace bbfit || kubectl create namespace bbfit

      - name: Apply ConfigMap & Deployment & Service
        run: |
          kubectl apply -f orchestrator/k8s/configmap.yaml
          kubectl apply -f orchestrator/k8s/deployment.yaml
          kubectl apply -f orchestrator/k8s/service.yaml

      - name: Update image to new SHA
        run: |
          kubectl set image deployment/bbfit-orchestrator \
            orchestrator=${{ env.IMAGE }}:sha-${{ github.sha }} \
            --namespace bbfit

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/bbfit-orchestrator \
            --namespace bbfit \
            --timeout=120s
